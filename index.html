<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mxhsty</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Gochi+Hand&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; 
            color: #eeeeee;
            font-family: 'Helvetica', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The central container shifted slightly left */
        .main-container {
            display: flex;
            align-items: center;
            gap: 40px;
            transform: translateX(-5%);
            position: relative;
        }

        /* Image wrapper to anchor the note */
        .image-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
        }

        /* Handwritten Note Styling */
        .handwritten-note {
            position: absolute;
            top: 135px;
            left: -60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 140px;
        }

        .handwritten-note svg {
            width: 35px;
            height: 35px;
            margin-bottom: 5px;
            /* Pointing back up and right at the image */
            transform: rotate(-10deg); 
            stroke: #ffffff;
        }

        .handwritten-note span {
            color: #ffffff;
            font-family: 'Gochi Hand', cursive;
            font-size: 1.2rem;
            white-space: nowrap;
        }

        /* Content wrapper for text and links */
        .content-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .name-header {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-weight: bold;
            font-style: italic;
            font-size: 3.5rem;
            margin: 0;
            line-height: 1;
            text-transform: lowercase;
            letter-spacing: -1.5px;
            color: #ffffff;
        }

        nav {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Courier Prime', monospace;
            font-weight: 400;
            font-size: 1rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        nav a:hover {
            opacity: 1;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                text-align: center;
                transform: translateX(0);
                gap: 110px; 
            }
            nav {
                justify-content: center;
                flex-wrap: wrap;
                max-width: 350px;
            }
            .content-group {
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="image-wrapper">
            <img src="https://i.imgur.com/WJ3xH2o.png" alt="mxhsty profile" class="profile-img" onerror="this.style.display='none'">
            
            <div class="handwritten-note">
                <!-- Smaller arrow pointing back toward the image -->
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21c3-3 6-9 15-9"/>
                    <path d="M11 8l8 4-8 4"/>
                </svg>
                <span>that's me</span>
            </div>
        </div>
        
        <div class="content-group">
            <h1 class="name-header">mxhsty</h1>
            
            <nav>
                <a href="https://www.tiktok.com/@carteristuffy" target="_blank">tiktok</a>
                <a href="https://pronouns.cc/@mxhsty" target="_blank">p.cc</a>
                <a href="https://www.twitch.tv/mxhstyistuff" target="_blank">twitch</a>
                <a href="https://www.youtube.com/channel/UC9wzi5INfkxBZkoRycr-7yw" target="_blank">youtube</a>
                <a href="https://open.spotify.com/user/31677niuovmr37mrl2tcabflxb2u" target="_blank">spotify</a>
                <a href="https://x.com/mxhstyistuff" target="_blank">twitter</a>
                <a href="https://www.roblox.com/users/5112719857/profile" target="_blank">roblox</a>
            </nav>
        </div>
    </div>

</body>
</html>
